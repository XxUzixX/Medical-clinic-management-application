<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Przychodnia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Przychodnia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/userhome">Strona główna</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/doctors">Lekarze</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/userhome/prescriptions">Recepty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/appointments/patient">Wizyty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/appointments/new">Nowa wizyta</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/booking/ai">Umów przez AI</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Wyloguj się</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
  <div class="row">
    <h1>Twoje recepty</h1>
  </div>
  <table class="table table-striped table-bordered table-hover">
    <thead class="table-dark">
    <tr>
      <th>Data wystawienia</th>
      <th>Lek</th>
      <th>Dawkowanie</th>
      <th>Instrukcje</th>
      <th>Lekarz</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="prescription : ${prescriptions}">
      <td th:text="${#temporals.format(prescription.issuedAt, 'yyyy-MM-dd HH:mm')}"></td>
      <td th:text="${prescription.medication}"></td>
      <td th:text="${prescription.dosage}"></td>
      <td th:text="${prescription.instructions}"></td>
      <td th:text="${prescription.doctorName}"></td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
