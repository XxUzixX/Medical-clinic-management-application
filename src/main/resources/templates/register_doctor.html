<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja Lekarza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Przychodnia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/adminhome">Strona główna</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register/doctor">Rejestracja lekarza</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/users">Użytkownicy</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Wyloguj się</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <div class="row col-md-8 offset-md-2">
        <div class="card">
            <div th:if="${param.success}">
                <div class="alert alert-success">Zarejestrowano pomyślnie!</div>
            </div>
            <div class="card-header">
                <h2 class="text-center">Rejestracja Lekarza</h2>
            </div>
            <div class="card-body">
                <form method="post" role="form" th:action="@{/register/doctor/save}" th:object="${doctor}">

                    <div class="mb-3">
                        <label class="form-label">Specjalizacja</label>
                        <select class="form-select" name="specialization" required>
                            <option value="" selected disabled>Wybierz specjalizację</option>
                            <option th:each="s : ${specializations}"
                                    th:value="${s}"
                                    th:text="${s}"></option>
                        </select>
                    </div>


                    <div class="form-group mb-3">
                        <label class="form-label">Imię</label>
                        <input class="form-control"
                               id="firstName"
                               name="firstName"
                               placeholder="Wprowadź imie"
                               th:field="*{firstName}"
                               type="text"
                        />
                        <p th:errors="*{firstName}" class="text-danger"
                           th:if="${#fields.hasErrors('firstName')}">
                        </p>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Nazwisko</label>
                        <input class="form-control"
                               id="lastName"
                               name="lastName"
                               placeholder="Wprowadź nazwisko"
                               th:field="*{lastName}"
                               type="text"
                        />
                        <p th:errors="*{lastName}" class="text-danger"
                           th:if="${#fields.hasErrors('lastName')}">
                        </p>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Numer telefonu</label>
                        <input class="form-control"
                               id="phoneNumber"
                               name="phoneNumber"
                               placeholder="Wprowadź numer telefonu"
                               th:field="*{phoneNumber}"
                               type="text"
                        />
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control"
                               id="email"
                               name="email"
                               placeholder="Wprowadź adres email"
                               th:field="*{email}"
                               type="email"
                        />
                        <p th:errors="*{email}" class="text-danger"
                           th:if="${#fields.hasErrors('email')}">
                        </p>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Hasło</label>
                        <input class="form-control"
                               id="password"
                               name="password"
                               placeholder="Wprowadź hasło"
                               th:field="*{password}"
                               type="password"
                        />
                        <p th:errors="*{password}" class="text-danger"
                           th:if="${#fields.hasErrors('password')}">
                        </p>
                    </div>

                    <div class="form-group mb-3">
                        <button class="btn btn-primary" type="submit">Rejestracja</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
