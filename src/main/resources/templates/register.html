<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Przychodnia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/index">Przychodnia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/register}">Rejestracja</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/login}">Logowanie</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<br />
<br />
<br />
<div class="container">
    <div class="row col-md-8 offset-md-2">
        <div class="card">
            <div th:if="${param.success}">
                <div class="alert alert-info">Zostałeś pomyślnie zarejestrowany!</div>
            </div>
            <div class="card-header">
                <h2 class="text-center">Rejestracja</h2>
            </div>
            <div class="card-body">
                <form method="post" role="form" th:action="@{/register/save}" th:object="${user}">

                    <div class="form-group mb-3">
                        <label class="form-label">Imię</label>
                        <input class="form-control"
                               id="firstName"
                               name="firstName"
                               placeholder="Wprowadź imie"
                               th:field="*{firstName}"
                               type="text"
                        />
                        <p th:errors="*{firstName}" class="text-danger"
                           th:if="${#fields.hasErrors('firstName')}">
                        </p>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Nazwisko</label>
                        <input class="form-control"
                               id="lastName"
                               name="lastName"
                               placeholder="Wprowadź nazwisko"
                               th:field="*{lastName}"
                               type="text"
                        />
                        <p th:errors="*{lastName}" class="text-danger"
                           th:if="${#fields.hasErrors('lastName')}">
                        </p>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Ulica</label>
                        <input class="form-control"
                               id="street"
                               name="street"
                               placeholder="Wprowadź ulicę"
                               th:field="*{street}"
                               type="text"
                        />
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Kod pocztowy</label>
                        <input class="form-control"
                               id="postalCode"
                               name="postalCode"
                               placeholder="Wprowadź kod pocztowy"
                               th:field="*{postalCode}"
                               type="text"
                        />
                        <p th:errors="*{postalCode}" class="text-danger"
                           th:if="${#fields.hasErrors('postalCode')}">
                        </p>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Miasto</label>
                        <input class="form-control"
                               id="city"
                               name="city"
                               placeholder="Wprowadź miasto"
                               th:field="*{city}"
                               type="text"
                        />
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Województwo</label>
                        <input class="form-control"
                               id="state"
                               name="state"
                               placeholder="Wprowadź województwo"
                               th:field="*{state}"
                               type="text"
                        />
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Numer telefonu</label>
                        <input class="form-control"
                               id="phoneNumber"
                               name="phoneNumber"
                               placeholder="Wprowadź numer telefonu"
                               th:field="*{phoneNumber}"
                               type="text"
                        />
                        <p th:errors="*{phoneNumber}" class="text-danger"
                           th:if="${#fields.hasErrors('phoneNumber')}">
                        </p>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control"
                               id="email"
                               name="email"
                               placeholder="Wprowadź adres email"
                               th:field="*{email}"
                               type="email"
                        />
                        <p th:errors="*{email}" class="text-danger"
                           th:if="${#fields.hasErrors('email')}">
                        </p>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Hasło</label>
                        <input class="form-control"
                               id="password"
                               name="password"
                               placeholder="Wprowadź hasło"
                               th:field="*{password}"
                               type="password"
                        />
                        <p th:errors="*{password}" class="text-danger"
                           th:if="${#fields.hasErrors('password')}">
                        </p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Rejestracja </button>
                            <a th:href="@{/login}" class="btn btn-danger">Masz już konto? Zaloguj się </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
