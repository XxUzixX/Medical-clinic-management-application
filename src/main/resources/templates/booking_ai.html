<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Umów wizytę z AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Przychodnia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/userhome">Strona główna</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/doctors">Lekarze</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/userhome/prescriptions">Recepty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/appointments/patient">Wizyty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/appointments/new">Nowa wizyta</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/booking/ai">Umów przez AI</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Wyloguj się</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container my-4">
    <h2>Umów wizytę z pomocą AI</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/booking/ai/analyze}" method="post" class="mb-4">
        <label class="form-label">Opisz swoje objawy</label>
        <textarea class="form-control" name="description" rows="5" th:text="${description}"></textarea>
        <button class="btn btn-primary mt-2" type="submit">Podpowiedz lekarza i terminy</button>
    </form>

    <div th:if="${aiSpec}">
        <div class="alert alert-info">
            Sugerowana specjalizacja: <strong th:text="${aiSpec}">INTERNISTA</strong>
            <span th:if="${confidence}"> (pewność: <span th:text="${#numbers.formatDecimal(confidence*100, 0, 0)}"></span>%)</span>
        </div>

        <div th:if="${#maps.isEmpty(options)}" class="text-muted">
            Brak dostępnych lekarzy/terminów w najbliższych 14 dniach dla tej specjalizacji.
        </div>

        <div class="row" th:if="${!#maps.isEmpty(options)}">
            <div class="col-12">
                <div class="list-group">
                    <div class="list-group-item" th:each="entry : ${options}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong th:text="${entry.key.name}">Lekarz</strong>
                                <small class="text-muted ms-2" th:text="${entry.key.specialization}">Specjalizacja</small>
                            </div>
                        </div>
                        <div class="mt-2 d-flex flex-wrap gap-2">
                            <form th:each="slot : ${entry.value}" th:action="@{/booking/ai/book}" method="post" class="d-inline">
                                <input type="hidden" name="doctorId" th:value="${entry.key.id}"/>
                                <input type="hidden" name="slot" th:value="${slot}"/>
                                <button class="btn btn-sm btn-outline-success" type="submit"
                                        th:text="${#temporals.format(slot, 'yyyy-MM-dd HH:mm')}">2025-01-01 10:00</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
