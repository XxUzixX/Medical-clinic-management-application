<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Przychodnia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Przychodnia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link" href="/doctorhome">Strona główna</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/doctor/patients">Pacjenci</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/doctor/prescriptions/new">Wystaw recepte</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/appointments/doctor">Wizyty</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/doctor/schedule">Godziny pracy</a>
            </li>
        </ul>
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link" href="/logout">Wyloguj się</a>
            </li>
        </ul>
    </div>
</nav>
<div class="container">
    <div class="row">
        <h1 class="text-center">Zarejestrowani Pacjenci</h1>
    </div>
    <table class="table table-striped table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Imię</th>
            <th>Nazwisko</th>
            <th>Email</th>
            <th>Ulica</th>
            <th>Kod pocztowy</th>
            <th>Miasto</th>
            <th>Województwo</th>
            <th>Numer telefonu</th>
            <th>Akcje</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="patient : ${patients}">
            <td th:text="${patient.firstName}"></td>
            <td th:text="${patient.lastName}"></td>
            <td th:text="${patient.email}"></td>
            <td th:text="${patient.street}"></td>
            <td th:text="${patient.postalCode}"></td>
            <td th:text="${patient.city}"></td>
            <td th:text="${patient.state}"></td>
            <td th:text="${patient.phoneNumber}"></td>
            <td>
                <a class="btn btn-sm btn-primary"
                   th:href="@{|/doctor/patients/${patient.id}|}">
                    Karta pacjenta
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXlDZ/2Eos8UPL4zYG8goKUpR91VXqX+jn5/tv7z8a9+wK0f5y2A4gNfV/3g" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVQI6Y92hDkd7AZEVLK4P+JW6POJKndj0iZ6mPfpX9vvSqsR8+j7u7f9F2z0g+B8" crossorigin="anonymous"></script>
</body>
</html>
